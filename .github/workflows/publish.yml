name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:check
      - run: npm run format:check
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm --prefix demo/mini-react ci
      - run: npm --prefix demo/mini-react test
      - run: npm --prefix demo/mini-angular ci
      - run: npm --prefix demo/mini-angular test -- --watch=false
      - run: npm publish --dry-run

  publish:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
