<div class="min-h-screen bg-slate-50 text-slate-800">
  <!-- Header -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center gap-3">
    <span class="text-2xl">🛡️</span>
    <div>
      <h1 class="text-xl font-bold tracking-tight">mini-guard · Angular demo</h1>
      <p class="text-xs text-slate-500">
        Ultra-lightweight RBAC · JWT decoding · zero dependencies
      </p>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <button
        (click)="toggleDebug()"
        [class]="'text-xs px-3 py-1 rounded-full font-medium transition-colors ' +
          (debugMode()
            ? 'bg-amber-500 text-white'
            : 'bg-slate-100 text-slate-500 hover:bg-slate-200')"
        title="Toggle debug logging to browser console"
      >
        {{ debugMode() ? 'debug: on' : 'debug: off' }}
      </button>
      @if (debugMode()) {
        <span class="text-xs text-amber-600 font-medium">↳ check console</span>
      }
      <a
        href="https://www.npmjs.com/package/mini-guard"
        target="_blank"
        rel="noreferrer"
        class="text-xs bg-red-600 text-white px-3 py-1 rounded-full font-medium hover:bg-red-700 transition-colors"
      >
        npm install mini-guard
      </a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-[320px_1fr] gap-6">
    <!-- Left panel -->
    <aside class="flex flex-col gap-4">
      <app-user-picker
        [presetUsers]="presetUsers"
        [activeLabel]="activeLabel()"
        (userSelected)="loginAs($event)"
      />
      <app-custom-token-panel
        [open]="customOpen()"
        [inputValue]="customInput()"
        (openToggled)="toggleCustomOpen()"
        (inputChanged)="customInput.set($event)"
        (tokenApplied)="loginCustom($event)"
      />
      <app-session-info
        [activeLabel]="activeLabel()"
        [roles]="roles()"
        [tokenPreview]="tokenPreview()"
        (loggedOut)="logout()"
      />
    </aside>

    <!-- Right panel -->
    <section class="flex flex-col gap-4">
      <app-access-matrix
        [moduleGroups]="moduleGroups"
        [roles]="roles()"
        [tick]="tick()"
      />
      <app-quick-actions
        [roles]="roles()"
        [tick]="tick()"
      />

      <!-- Code snippet -->
      <div class="bg-slate-900 rounded-xl p-4 text-sm font-mono overflow-x-auto">
        <p class="text-slate-400 text-xs mb-2">// How this demo is wired</p>
        <pre class="text-slate-100 whitespace-pre text-xs leading-relaxed">{{ codeSnippet() }}</pre>
      </div>
    </section>
  </main>
</div>
